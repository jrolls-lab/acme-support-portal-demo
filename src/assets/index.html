<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACME Support Portal</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div id="app">
    <header>
      <div class="header-inner">
        <h1>ACME Support Portal</h1>
        <button id="new-ticket-btn" class="btn btn-primary">+ New Ticket</button>
      </div>
    </header>
    <main>
      <div id="ticket-list"></div>
      <dialog id="new-ticket-dialog">
        <form id="ticket-form" method="dialog">
          <h2>New Support Ticket</h2>
          <label>Title <input type="text" name="title" required /></label>
          <label>Description <textarea name="description" rows="4" required></textarea></label>
          <div class="form-actions">
            <button type="button" id="cancel-btn" class="btn">Cancel</button>
            <button type="submit" class="btn btn-primary">Submit</button>
          </div>
        </form>
      </dialog>
    </main>
  </div>
  <script src="/app.js"></script>
</body>
</html>
